name: Deploy Supabase to Production

on:
  push:
    branches:
      - production
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase-production.yml'
  workflow_dispatch: # Enable manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Supabase project
        run: supabase link --project-ref $PROJECT_ID

      - name: Run database migrations (with safety checks)
        run: ./scripts/safe-db-push.sh
        env:
          CI: true

      - name: Deploy Edge Functions
        run: supabase functions deploy --project-ref $PROJECT_ID

      - name: Generate TypeScript types
        run: supabase gen types typescript --project-id $PROJECT_ID > supabase/database.types.ts

      - name: Commit generated types
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add supabase/database.types.ts
          git diff --staged --quiet || git commit -m "Update database types [skip ci]"
          git push || echo "No changes to push"
