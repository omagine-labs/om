name: Deploy Vercel Production

on:
  push:
    branches:
      - production
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-vercel-production.yml'
  workflow_dispatch: # Enable manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create GitHub Deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              description: 'Vercel Production Deployment'
            });
            return deployment.data.id;
          result-encoding: string

      - name: Set Deployment Status to In Progress
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: 'in_progress',
              description: 'Deploying to Vercel Production...'
            });

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Copy database types to frontend
        run: |
          mkdir -p frontend/supabase
          cp supabase/database.types.ts frontend/supabase/database.types.ts
          echo "✅ Copied database.types.ts to frontend/supabase/"

      - name: Deploy to Vercel Production
        id: deploy
        working-directory: frontend
        run: |
          URL=$(vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Production URL: $URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Update Deployment Status to Success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              description: 'Deployed to Vercel Production'
            });

      - name: Update Deployment Status to Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: 'failure',
              description: 'Production deployment failed'
            });

      - name: Deployment Summary
        if: success()
        run: |
          echo ""
          echo "=========================================="
          echo "✅ Frontend Deployed to Production!"
          echo "=========================================="
          echo ""
          echo "🌐 Production URL: ${{ steps.deploy.outputs.url }}"
          echo "📝 Commit: ${{ github.sha }}"
