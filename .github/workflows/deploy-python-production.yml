name: Deploy Python Backend to Production

on:
  push:
    branches:
      - production
    paths:
      - 'python-backend/**'
      - '.github/workflows/deploy-python-production.yml'
  workflow_dispatch: # Enable manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/YOUR_PROJECT_NUMBER/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'github-actions@YOUR_GCP_PROJECT.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Submit Docker build
        id: build
        run: |
          cd python-backend
          BUILD_ID=$(gcloud builds submit \
            --tag us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/meeting-intelligence/meeting-intelligence-backend:${{ github.sha }} \
            --tag us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/meeting-intelligence/meeting-intelligence-backend:latest \
            --async \
            --format="value(id)")
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "Submitted build: $BUILD_ID"

      - name: Wait for build completion
        run: |
          BUILD_ID="${{ steps.build.outputs.build_id }}"
          echo "⏳ Waiting for build $BUILD_ID to complete..."
          echo "📊 View live logs: https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=${{ secrets.GCP_PROJECT_ID }}"
          echo ""

          ELAPSED=0
          while true; do
            STATUS=$(gcloud builds describe $BUILD_ID --format="value(status)")

            if [ "$STATUS" = "SUCCESS" ]; then
              echo ""
              echo "✅ Build completed successfully in ${ELAPSED}s!"
              echo "🐳 Image: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/meeting-intelligence/meeting-intelligence-backend:${{ github.sha }}"
              break
            elif [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "CANCELLED" ] || [ "$STATUS" = "TIMEOUT" ]; then
              echo ""
              echo "❌ Build failed with status: $STATUS"
              echo "📋 View logs: https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=${{ secrets.GCP_PROJECT_ID }}"
              exit 1
            elif [ "$STATUS" = "WORKING" ] || [ "$STATUS" = "QUEUED" ]; then
              echo "⏳ Build status: $STATUS (${ELAPSED}s elapsed)"
            else
              echo "🔄 Build status: $STATUS (${ELAPSED}s elapsed)"
            fi

            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          echo "🚀 Deploying to Cloud Run..."
          gcloud run deploy meeting-intelligence-backend \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/meeting-intelligence/meeting-intelligence-backend:latest \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --timeout 900 \
            --min-instances 1 \
            --max-instances 10 \
            --execution-environment gen2 \
            --set-secrets="SUPABASE_URL=supabase-url:latest,SUPABASE_SECRET_KEY=supabase-service-role-key:latest,GEMINI_API_KEY=gemini-api-key:latest,ASSEMBLYAI_API_KEY=assemblyai-api-key:latest,API_KEY=python-backend-api-key:latest,LANGFUSE_HOST=LANGFUSE_HOST:latest,LANGFUSE_PUBLIC_KEY=LANGFUSE_PUBLIC_KEY:latest,LANGFUSE_SECRET_KEY=LANGFUSE_SECRET_KEY:latest,SENTRY_DSN=SENTRY_DSN:latest,RESEND_API_KEY=RESEND_API_KEY:latest" \
            --set-env-vars="TRANSCRIPTION_PROVIDER=assemblyai,SENTRY_ENVIRONMENT=production,FRONTEND_URL=https://app.omaginelabs.com,GITHUB_SHA=${{ github.sha }}"

      - name: Deployment Summary
        if: success()
        run: |
          echo ""
          echo "=========================================="
          echo "✅ Python Backend Deployed Successfully!"
          echo "=========================================="
          echo ""
          echo "🌐 Service URL:"
          gcloud run services describe meeting-intelligence-backend \
            --region us-central1 \
            --format="value(status.url)"
          echo ""
          echo "📝 Commit: ${{ github.sha }}"
          echo "🏷️  Image: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/meeting-intelligence/meeting-intelligence-backend:${{ github.sha }}"
          echo ""
          echo "🔐 Authentication: Workload Identity Federation"
