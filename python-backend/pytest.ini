[pytest]
# Test discovery patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async test support
asyncio_mode = auto

# Output and coverage settings
addopts =
    --verbose
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=0

# Test markers (for categorizing tests)
markers =
    unit: Unit tests for isolated components
    integration: Integration tests with external services
    slow: Tests that take significant time to run
    asyncio: Async tests

# Ignore directories
norecursedirs =
    .git
    .venv
    venv
    __pycache__
    *.egg-info
    storage

# Coverage configuration
[coverage:run]
source = app
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */.venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
