name: Tests

# DISABLED: Run checks locally with `npm run check-pr` to save GitHub Actions costs
# Can be manually triggered if needed via GitHub UI
on:
  workflow_dispatch:
  # pull_request:
  #   branches: [main]
  # push:
  #   branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest  # Changed from macos-latest to save 90% on Actions costs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run linter
        run: npm run lint

      # Build removed - only happens on releases via release.yml workflow
      # This saves GitHub Actions minutes (macOS builds are 10x cost)
